# ───────────────────────────────────────────────────────────────
#  Hyprland — look macOS
# ───────────────────────────────────────────────────────────────

monitor = , preferred, auto, 1

# Apps por defecto
$terminal = kitty
$fileManager = nautilus
$menu       = wofi --show drun

# ── Autostart ──────────────────────────────────────────────────
exec-once = swaybg -i ~/Pictures/Wallpapers/forest.jpg -m fill
exec-once = swaync
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Pre-caliento el cache del clima antes de que waybar lance su módulo,
# así el primer paint ya muestra la temperatura sin esperar al curl.
exec-once = ~/.config/waybar/scripts/weather.sh > /dev/null 2>&1 &
# exec-once = nwg-dock-hyprland -i 48 -mb 6 -ml 6 -mr 6 -hd -nolauncher -p bottom -l overlay -x  # alternativa si prefieres dock dedicado
exec-once = waybar
exec-once = nwg-dock-hyprland -p bottom -i 44 -mb 8 -ml 12 -mr 12 -nolauncher -l overlay -r
# exec-once = eww open-many topbar dock   # legacy: vuelve a eww comentando waybar/nwg-dock
exec-once = eww daemon                   # daemon para popups (powermenu, netmenu, volmenu); no abre topbar/dock

# Variables de entorno (cursor, Qt, etc.)
env = XCURSOR_THEME,McMojave-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,McMojave-cursors
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11

# ── Apariencia general ─────────────────────────────────────────
general {
    gaps_in  = 6
    gaps_out = 12
    border_size = 2
    col.active_border   = rgba(ffffffaa) rgba(c0c0c0aa) 45deg
    col.inactive_border = rgba(00000044)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 14

    blur {
        enabled       = true
        size          = 8
        passes        = 4
        new_optimizations = true
        ignore_opacity = true
        xray          = false
        noise         = 0.02
        contrast      = 1.0
        brightness    = 1.0
        vibrancy      = 0.25
    }

    shadow {
        enabled    = true
        range      = 30
        render_power = 3
        color      = rgba(00000088)
        offset     = 0 8
    }

    active_opacity   = 0.96
    inactive_opacity = 0.88
}

animations {
    enabled = true

    bezier = macIn,  0.32, 0.72, 0, 1
    bezier = macOut, 0.42, 0,    0.58, 1
    bezier = bounce, 0.5,  1.5,  0.5,  1

    animation = windows,     1, 4, macIn,  popin 80%
    animation = windowsOut,  1, 3, macOut, popin 80%
    animation = border,      1, 8, default
    animation = fade,        1, 5, macIn
    animation = workspaces,  1, 4, macIn,  slide
    animation = layers,      1, 3, macIn,  fade
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = 0x111111
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    focus_on_activate = true
}

input {
    kb_layout = es
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        scroll_factor  = 0.6
        tap-to-click   = true
    }
}

gesture = 3, horizontal, workspace

# ── Reglas de ventana ──────────────────────────────────────────
windowrule {
    name = float-dialogs
    match:class = ^(pavucontrol|nm-connection-editor|blueman-manager)$
    float = yes
}

windowrule {
    name = float-pip
    match:title = ^(Picture-in-Picture)$
    float = yes
    pin = yes
}

windowrule {
    name = opacity-terminals
    match:class = ^(kitty|Alacritty|wezterm)$
    opacity = 0.92 0.85
}

windowrule {
    name = opacity-filemanagers
    match:class = ^(thunar|nautilus|org\.gnome\.Nautilus)$
    opacity = 0.95 0.90
}

# Layer rules para EWW / dock / notificaciones
layerrule {
    name = blur-swaync-cc
    match:namespace = swaync-control-center
    blur = true
    ignore_alpha = true
}

layerrule {
    name = blur-swaync-notif
    match:namespace = swaync-notification-window
    blur = true
}

layerrule {
    name = blur-waybar
    match:namespace = waybar
    blur = true
    ignore_alpha = true
}

layerrule {
    name = blur-nwg-dock
    match:namespace = nwg-dock
    blur = true
    ignore_alpha = true
}

layerrule {
    name = blur-eww-powermenu
    match:namespace = eww-powermenu
    blur = true
    ignore_alpha = true
}

layerrule {
    name = blur-eww-netmenu
    match:namespace = eww-netmenu
    blur = true
    ignore_alpha = true
}

layerrule {
    name = blur-eww-volmenu
    match:namespace = eww-volmenu
    blur = true
    ignore_alpha = true
}

# ── Atajos ─────────────────────────────────────────────────────
$mainMod = SUPER

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q,      killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, V,      togglefloating
bind = $mainMod, Space,  exec, $menu
bind = $mainMod, F,      fullscreen
bind = $mainMod, P,      pseudo
bind = $mainMod, J,      togglesplit
bind = $mainMod, L,      exec, hyprlock
bind = ,        Print,   exec, grim -g "$(slurp)" - | wl-copy

# Foco
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces 1-9
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Mouse: arrastrar / redimensionar con SUPER
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volumen / brillo
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
